---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lookup-runtime-caches:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      linux-x64: ${{ steps.lookup-linux-x64.outputs.cache-hit }}
      win-x64: ${{ steps.lookup-win-x64.outputs.cache-hit }}
      osx-arm64: ${{ steps.lookup-osx-arm64.outputs.cache-hit }}
      browser-wasm: ${{ steps.lookup-browser-wasm.outputs.cache-hit }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lookup linux-x64
        id: lookup-linux-x64
        uses: ./.github/actions/lookup-runtime-cache
        with:
          runtime: linux-x64

      - name: Lookup win-x64
        id: lookup-win-x64
        uses: ./.github/actions/lookup-runtime-cache
        with:
          runtime: win-x64

      - name: Lookup osx-arm64
        id: lookup-osx-arm64
        uses: ./.github/actions/lookup-runtime-cache
        with:
          runtime: osx-arm64

      - name: Lookup browser-wasm
        id: lookup-browser-wasm
        uses: ./.github/actions/lookup-runtime-cache
        with:
          runtime: browser-wasm

  runtime-linux-x64:
    needs: lookup-runtime-caches
    if: ${{ !needs.lookup-runtime-caches.outputs.linux-x64 }}
    uses: ./.github/workflows/runtime-linux-x64.yml
    permissions:
      contents: read
      actions: write

  runtime-win-x64:
    needs: lookup-runtime-caches
    if: ${{ !needs.lookup-runtime-caches.outputs.win-x64 }}
    uses: ./.github/workflows/runtime-win-x64.yml
    permissions:
      contents: read
      actions: write

  runtime-osx-arm64:
    needs: lookup-runtime-caches
    if: ${{ !needs.lookup-runtime-caches.outputs.osx-arm64 }}
    uses: ./.github/workflows/runtime-osx-arm64.yml
    permissions:
      contents: read
      actions: write

  runtime-browser-wasm:
    needs: lookup-runtime-caches
    if: ${{ !needs.lookup-runtime-caches.outputs.browser-wasm }}
    uses: ./.github/workflows/runtime-browser-wasm.yml
    permissions:
      contents: read
      actions: write

  build:
    name: Build
    needs:
      - runtime-linux-x64
      - runtime-win-x64
      - runtime-osx-arm64
      - runtime-browser-wasm

    if: always()

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: read
      checks: write
      pull-requests: write
      actions: write
      id-token: write
      attestations: write

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Restore linux-x64
        uses: ./.github/actions/restore-runtime-cache
        with:
          runtime: linux-x64

      - name: Restore win-x64
        uses: ./.github/actions/restore-runtime-cache
        with:
          runtime: win-x64

      - name: Restore osx-arm64
        uses: ./.github/actions/restore-runtime-cache
        with:
          runtime: osx-arm64

      - name: Restore browser-wasm
        uses: ./.github/actions/restore-runtime-cache
        with:
          runtime: browser-wasm

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          cache: true
          cache-dependency-path: |
            global.json
            '**/Directory.Packages.props'
            .config/dotnet-tools.json

      - name: Restore dependencies
        run: |
          dotnet tool restore
          dotnet workload restore
          dotnet restore
          dotnet restore Documentation --no-dependencies

      - name: Build
        run: |
          dotnet build --configuration Release --no-restore --binaryLogger:build.binlog

      - name: Test
        run: |
          dotnet test --configuration Release --no-build \
            --report-spekt-junit \
            --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

      - name: Package
        run: |
          dotnet pack --configuration Release --no-build

      - name: Upload Package Artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts
          path: |
            **/*.nupkg
            **/*.snupkg
            retention-days: 14

      - name: Build Attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: artifacts.zip
          subject-digest: sha256:${{ steps.upload.outputs.artifact-digest }}

      - name: Publish WebAssembly example
        # This one is *slow*, so only when commiting to main (and deploying GitHub Pages)
        if: github.event_name != 'pull_request'
        run: |
          dotnet publish --configuration Release --no-restore --binaryLogger:wasm.binlog

      - name: Build Documentation
        run: |
          dotnet build --configuration Release --no-restore Documentation --binaryLogger:documentation.binlog

      - name: Upload GitHub Pages as artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: Documentation/_site/

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          report_type: test_results
          files: '**/TestResults/TestResults.xml'
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: '**/TestResults/coverage.cobertura.xml'
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Submit Dependencies to GitHub
        uses: advanced-security/component-detection-dependency-submission-action@31f25a8de68ae5ce2ca274bc28546a78683c15ce # v0.1.4
        with:
          detectorArgs: MSBuildBinaryLog=Enable
          detectorsFilter: MSBuildBinaryLog

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always

  deploy:
    name: Deploy
    needs: build
    if: ${{ always() && github.event_name == 'push' && needs.build.result == 'success' }}

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
