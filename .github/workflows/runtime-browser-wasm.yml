---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# This file requires LF line endings, as it is used in cross-platform GitHub action hashes.

name: Runtime browser-wasm

on:
  workflow_dispatch:
  workflow_call:

env:
  RUNTIME: browser-wasm

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Patch for WASM
        run: |
          cp libc/xmss.c xmss-library/src/
          patch --directory=xmss-library --strip=1 < libc/wasm.diff

      - name: Prepare packages
        run: |
          sudo apt-get update
          sudo apt-get install -y emscripten

      - name: Configure
        run: >
          emcmake cmake
          -S xmss-library
          -B build
          -DXMSS_C99_COMPATIBLE=OFF
          -DCMAKE_EXE_LINKER_FLAGS="-s NODERAWFS=1"
          -DCMAKE_STATIC_LIBRARY_PREFIX_C=""

      - name: Configure (pthread)
        run: >
          emcmake cmake
          -S xmss-library
          -B build-pthread
          -DXMSS_C99_COMPATIBLE=OFF
          -DCMAKE_C_FLAGS="-pthread"
          -DCMAKE_EXE_LINKER_FLAGS="-s NODERAWFS=1"
          -DCMAKE_STATIC_LIBRARY_PREFIX_C=""

      - name: Build
        run: cmake --build build

      - name: Build (pthread)
        run: cmake --build build-pthread

      - name: Test
        working-directory: build
        env:
          NODE_OPTIONS: --no-experimental-fetch
        run: ctest

      - name: Test (pthread)
        working-directory: build-pthread
        env:
          NODE_OPTIONS: --no-experimental-fetch
        run: ctest

      - name: Copy artifacts
        run: |
          mkdir -p "Xmss/runtimes/${{ env.RUNTIME }}/nativeassets"
          cp build/src/xmss.a "Xmss/runtimes/${{ env.RUNTIME }}/nativeassets/xmss.a"
          cp build-pthread/src/xmss.a "Xmss/runtimes/${{ env.RUNTIME }}/nativeassets/xmss-pthread.a"

      - name: Save runtime cache
        id: save-runtime-cache
        uses: ./.github/actions/save-runtime-cache
        with:
          runtime: ${{ env.RUNTIME }}
