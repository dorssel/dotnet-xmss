---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 6 * * 2'

permissions: {}

jobs:
  lookup-runtime-caches:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      browser-wasm: ${{ steps.lookup-browser-wasm.outputs.cache-hit }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Lookup browser-wasm
        id: lookup-browser-wasm
        uses: ./.github/actions/lookup-runtime-cache
        with:
          runtime: browser-wasm

  runtime-browser-wasm:
    needs: lookup-runtime-caches
    if: ${{ !needs.lookup-runtime-caches.outputs.browser-wasm }}
    uses: ./.github/workflows/runtime-browser-wasm.yml
    permissions:
      contents: read
      actions: write

  analyze:
    name: Analyze (CodeQL)

    needs:
      - runtime-browser-wasm

    if: always()

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: csharp

      - name: Restore browser-wasm
        uses: ./.github/actions/restore-runtime-cache
        with:
          runtime: browser-wasm

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          cache: true
          cache-dependency-path: |
            global.json
            '**/Directory.Packages.props'
            .config/dotnet-tools.json

      - name: Install dependencies
        run: |
          dotnet tool restore
          dotnet workload restore
          dotnet restore
          dotnet restore Documentation --no-dependencies

      - name: Build
        run: |
          dotnet build --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
